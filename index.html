<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LRT Jabodebek — Live Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0a0e17;
    --panel: #111722;
    --panel2: #161d2c;
    --border: #1e2d45;
    --accent: #00d4aa;
    --accent2: #ff6b35;
    --line-cibubur: #00c8ff;
    --line-bekasi: #ff9900;
    --line-main: #a855f7;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --text-bright: #f8fafc;
    --glow: rgba(0,212,170,0.15);
    --train-size: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 20px;
    z-index: 1000;
    flex-shrink: 0;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), #0099cc);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text-bright);
  }
  .logo-sub {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .header-clock {
    margin-left: auto;
    text-align: right;
  }
  .clock-time {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.05em;
    line-height: 1;
  }
  .clock-date {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .clock-speed {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    margin-top: 2px;
  }

  .header-stats {
    display: flex;
    gap: 20px;
    align-items: center;
  }
  .stat-item {
    text-align: center;
    border-left: 1px solid var(--border);
    padding-left: 20px;
  }
  .stat-num {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--text-bright);
    line-height: 1;
  }
  .stat-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* ── SPEED CONTROL ── */
  .speed-control {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
  }
  .speed-control label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .speed-btn {
    background: var(--border);
    border: none;
    color: var(--text);
    width: 28px; height: 28px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .speed-btn:hover { background: var(--accent); color: var(--bg); }
  .speed-val {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    min-width: 40px;
    text-align: center;
  }

  /* ── MAIN LAYOUT ── */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 300px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .sidebar-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    flex: 1;
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    padding: 10px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    background: rgba(0,212,170,0.05);
  }

  .tab-content { display: none; flex: 1; overflow-y: auto; }
  .tab-content.active { display: flex; flex-direction: column; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── TRAIN LIST ── */
  .train-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }
  .train-item:hover { background: var(--panel2); }
  .train-item.selected { background: rgba(0,212,170,0.08); border-left: 3px solid var(--accent); }

  .train-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
  }
  .train-badge {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 3px;
    letter-spacing: 0.05em;
  }
  .badge-cibubur { background: rgba(0,200,255,0.15); color: var(--line-cibubur); border: 1px solid rgba(0,200,255,0.3); }
  .badge-bekasi { background: rgba(255,153,0,0.15); color: var(--line-bekasi); border: 1px solid rgba(255,153,0,0.3); }
  .badge-main { background: rgba(168,85,247,0.15); color: var(--line-main); border: 1px solid rgba(168,85,247,0.3); }

  .train-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-bright);
  }
  .train-dest {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 5px;
  }
  .train-progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 4px;
  }
  .train-progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }
  .train-eta {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--text-dim);
  }
  .train-eta span { color: var(--accent); font-family: 'Space Mono', monospace; }

  /* ── STATION LIST ── */
  .station-item {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .station-item:hover { background: var(--panel2); }
  .station-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 2px solid;
    flex-shrink: 0;
  }
  .station-info { flex: 1; }
  .station-name { font-size: 12px; font-weight: 500; color: var(--text-bright); }
  .station-next { font-size: 10px; color: var(--text-dim); margin-top: 1px; }
  .station-trains {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent);
  }

  /* ── SCHEDULE TABLE ── */
  .schedule-section { padding: 12px 16px; }
  .schedule-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .sched-row {
    display: grid;
    grid-template-columns: 60px 1fr 60px;
    gap: 6px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
  }
  .sched-time {
    font-family: 'Space Mono', monospace;
    color: var(--accent);
  }
  .sched-dest { color: var(--text); }
  .sched-status { text-align: right; }
  .status-running { color: #22c55e; }
  .status-waiting { color: var(--text-dim); }
  .status-done { color: var(--border); text-decoration: line-through; }

  /* ── MAP ── */
  #map {
    flex: 1;
    background: #0a0e17;
  }

  /* Custom leaflet styles */
  .leaflet-tile-pane { filter: brightness(0.6) saturate(0.3) hue-rotate(200deg); }
  .leaflet-control-zoom { display: none; }
  .leaflet-container { background: var(--bg); }

  /* Train marker */
  .train-marker {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 2px solid white;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px;
    font-weight: bold;
    box-shadow: 0 0 8px currentColor, 0 2px 8px rgba(0,0,0,0.5);
    transition: transform 0.3s ease;
    cursor: pointer;
    position: relative;
  }
  .train-marker::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.2;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.2; }
    50% { transform: scale(1.5); opacity: 0; }
  }

  .station-marker {
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 2px solid;
    background: var(--bg);
  }

  /* Leaflet popup custom */
  .leaflet-popup-content-wrapper {
    background: var(--panel) !important;
    border: 1px solid var(--border) !important;
    border-radius: 8px !important;
    color: var(--text) !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
  }
  .leaflet-popup-tip { background: var(--panel) !important; }
  .leaflet-popup-content { margin: 12px 16px !important; }
  .popup-title { font-weight: 600; font-size: 13px; color: var(--text-bright); margin-bottom: 4px; }
  .popup-sub { font-size: 11px; color: var(--text-dim); }
  .popup-val { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--accent); }

  /* Bottom info bar */
  .info-bar {
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 6px 20px;
    display: flex;
    gap: 24px;
    align-items: center;
    flex-shrink: 0;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-dim);
  }
  .legend-line {
    width: 24px; height: 3px;
    border-radius: 2px;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
  }
  .info-right {
    margin-left: auto;
    font-size: 10px;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
  }

  /* Selected train details */
  .train-detail {
    padding: 14px 16px;
    background: rgba(0,212,170,0.05);
    border-bottom: 1px solid var(--border);
  }
  .detail-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .detail-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    padding: 3px 0;
  }
  .detail-label { color: var(--text-dim); }
  .detail-val { font-family: 'Space Mono', monospace; color: var(--text-bright); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🚈</div>
    <div>
      <div class="logo-text">LRT JABODEBEK</div>
      <div class="logo-sub">Live Position Tracker · GAPEKA</div>
    </div>
  </div>

  <div class="header-stats">
    <div class="stat-item">
      <div class="stat-num" id="stat-running">0</div>
      <div class="stat-label">Kereta Aktif</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">18</div>
      <div class="stat-label">Stasiun</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">3</div>
      <div class="stat-label">Jalur</div>
    </div>
  </div>

  <div class="speed-control">
    <label>Kecepatan Waktu</label>

</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-tabs">
      <button class="tab-btn active" onclick="switchTab('trains', this)">Kereta</button>
      <button class="tab-btn" onclick="switchTab('stations', this)">Stasiun</button>
      <button class="tab-btn" onclick="switchTab('schedule', this)">Jadwal</button>
    </div>

    <div class="tab-content active" id="tab-trains">
      <!-- Train items injected here -->
    </div>
    <div class="tab-content" id="tab-stations">
      <!-- Station items injected here -->
    </div>

      <div class="schedule-section" id="schedule-content">
        <div class="schedule-label">Pilih stasiun untuk melihat jadwal</div>

  <div id="map"></div>
</div>

<div class="info-bar">
  <div class="legend-item"><div class="legend-line" style="background:var(--line-cibubur)"></div> Harjamukti ↔ Cawang</div>
  <div class="legend-item"><div class="legend-line" style="background:var(--line-bekasi)"></div> Jatimulya ↔ Cawang</div>
  <div class="legend-item"><div class="legend-line" style="background:var(--line-main)"></div> Dukuh Atas ↔ Cawang</div>
  <div class="legend-item">
    <div style="display:flex;align-items:center;gap:4px">
      <div class="legend-dot" style="background:var(--line-cibubur);width:12px;height:12px;border-radius:50%"></div>
      <span>Posisi kereta (perkiraan GAPEKA)</span>
    </div>
  </div>
  <div class="info-right" id="update-time">Memperbarui...</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// DATA: STATIONS
// ═══════════════════════════════════════════════════════════
const STATIONS = {
  dukuh_atas:      { name:"Dukuh Atas",        lat:-6.2048, lon:106.8255, lines:["main"] },
  setiabudi:       { name:"Setiabudi",         lat:-6.2093, lon:106.8302, lines:["main"] },
  rasuna_said:     { name:"Rasuna Said",       lat:-6.2216, lon:106.8322, lines:["main"] },
  kuningan:        { name:"Kuningan",          lat:-6.2288, lon:106.8332, lines:["main"] },
  pancoran:        { name:"Pancoran",          lat:-6.2421, lon:106.8385, lines:["main"] },
  cikoko:          { name:"Cikoko",            lat:-6.2435, lon:106.8571, lines:["main"] },
  ciliwung:        { name:"Ciliwung",          lat:-6.2434, lon:106.8640, lines:["main"] },
  cawang:          { name:"Cawang",            lat:-6.2459, lon:106.8712, lines:["main","cibubur","bekasi"] },
  
  // Cibubur branch
  taman_mini:      { name:"TMII",              lat:-6.2929, lon:106.8806, lines:["cibubur"] },
  kampung_rambutan:{ name:"Kampung Rambutan",  lat:-6.3096, lon:106.8844, lines:["cibubur"] },
  ciracas:         { name:"Ciracas",           lat:-6.3238, lon:106.8866, lines:["cibubur"] },
  harjamukti:      { name:"Harjamukti",        lat:-6.3739, lon:106.8957, lines:["cibubur"] },
  
  // Bekasi branch
  halim:           { name:"Halim",             lat:-6.2459, lon:106.8873, lines:["bekasi"] },
  jatibening:      { name:"Jatibening Baru",   lat:-6.2577, lon:106.9279, lines:["bekasi"] },
  cikunir1:        { name:"Cikunir 1",         lat:-6.2566, lon:106.9519, lines:["bekasi"] },
  cikunir2:        { name:"Cikunir 2",         lat:-6.2546, lon:106.9632, lines:["bekasi"] },
  bekasi_barat:    { name:"Bekasi Barat",      lat:-6.2529, lon:106.99040, lines:["bekasi"] },
  jatimulya:       { name:"Jatimulya",         lat:-6.2641, lon:107.0217, lines:["bekasi"] },
};

// Route definitions (ordered station arrays)
const ROUTES = {
  // Line 1: Cibubur line (Harjamukti <-> Cawang, then Cawang<->Dukuh Atas)
  // Full route: Harjamukti → Dukuh Atas
  cibubur_to_dukuh: [
    "harjamukti","ciracas","kampung_rambutan","taman_mini","cawang",
    "ciliwung","cikoko","pancoran","kuningan","rasuna_said","setiabudi","dukuh_atas"
  ],
  dukuh_to_cibubur: [
    "dukuh_atas","setiabudi","rasuna_said","kuningan","pancoran","cikoko","ciliwung",
    "cawang","taman_mini","kampung_rambutan","ciracas","harjamukti"
  ],
  // Line 2: Bekasi line (Jatimulya <-> Cawang, then Cawang<->Dukuh Atas)
  bekasi_to_dukuh: [
    "jatimulya","bekasi_barat","cikunir2","cikunir1","jatibening","halim","cawang",
    "ciliwung","cikoko","pancoran","kuningan","rasuna_said","setiabudi","dukuh_atas"
  ],
  dukuh_to_bekasi: [
    "dukuh_atas","setiabudi","rasuna_said","kuningan","pancoran","cikoko","ciliwung",
    "cawang","halim","jatibening","cikunir1","cikunir2","bekasi_barat","jatimulya"
  ],
};

// Travel time between each consecutive station (minutes)
const TRAVEL_TIMES = {
  // Main line
  dukuh_atas_setiabudi: 3, setiabudi_rasuna_said: 3, rasuna_said_kuningan: 3,
  kuningan_pancoran: 5, pancoran_cikoko: 4, cikoko_ciliwung: 3, ciliwung_cawang: 3,
  // Cibubur branch
  cawang_taman_mini: 7, taman_mini_kampung_rambutan: 6, kampung_rambutan_ciracas: 7, ciracas_harjamukti: 5,
  // Bekasi branch
  cawang_halim: 4, halim_jatibening: 8, jatibening_cikunir1: 5,
  cikunir1_cikunir2: 4, cikunir2_bekasi_barat: 9, bekasi_barat_jatimulya: 8,
};

function getTravelTime(a, b) {
  const key1 = `${a}_${b}`, key2 = `${b}_${a}`;
  return (TRAVEL_TIMES[key1] || TRAVEL_TIMES[key2] || 4) * 60; // convert to seconds
}

// ═══════════════════════════════════════════════════════════
// ROUTE GEOMETRY (loaded from rute_lrt_siap_pakai.geojson)
// ═══════════════════════════════════════════════════════════

// Lookup: ROUTE_SEGMENTS[routeName]["fromStation_TO_toStation"] = { coords: [[lon,lat],...], cumDist: [...] }
const ROUTE_SEGMENTS = {};

function haversineDist(lon1, lat1, lon2, lat2) {
  const R = 6371000;
  const p1 = lat1 * Math.PI/180, p2 = lat2 * Math.PI/180;
  const dp = (lat2-lat1)*Math.PI/180, dl = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function buildCumulativeDistances(coords) {
  const cumDist = [0];
  for (let i = 1; i < coords.length; i++) {
    const d = haversineDist(coords[i-1][0], coords[i-1][1], coords[i][0], coords[i][1]);
    cumDist.push(cumDist[i-1] + d);
  }
  return cumDist;
}

function interpolateAlongTrack(segmentData, frac) {
  // Interpolate position along a track segment at fraction frac (0-1)
  if (!segmentData || !segmentData.coords || segmentData.coords.length < 2) return null;
  const { coords, cumDist } = segmentData;
  const totalLen = cumDist[cumDist.length - 1];
  const targetDist = frac * totalLen;
  
  // Find the two points that bracket targetDist
  for (let i = 1; i < cumDist.length; i++) {
    if (cumDist[i] >= targetDist) {
      const segLen = cumDist[i] - cumDist[i-1];
      const t = segLen > 0 ? (targetDist - cumDist[i-1]) / segLen : 0;
      const lon = coords[i-1][0] + (coords[i][0] - coords[i-1][0]) * t;
      const lat = coords[i-1][1] + (coords[i][1] - coords[i-1][1]) * t;
      return { lat, lon };
    }
  }
  // Fallback: end of track
  const last = coords[coords.length - 1];
  return { lat: last[1], lon: last[0] };
}

function getSegmentKey(fromStation, toStation) {
  return `${fromStation}_TO_${toStation}`;
}

function getRouteSegment(routeName, fromStation, toStation) {
  if (!ROUTE_SEGMENTS[routeName]) return null;
  return ROUTE_SEGMENTS[routeName][getSegmentKey(fromStation, toStation)] || null;
}

async function loadRouteSegments() {
  try {
    const response = await fetch('./rute_lrt_siap_pakai.geojson');
    if (!response.ok) throw new Error('Failed to load route segments');
    const geojson = await response.json();
    
    geojson.features.forEach(feat => {
      const { route, from: fromSt, to: toSt } = feat.properties;
      const coords = feat.geometry.coordinates;
      const cumDist = buildCumulativeDistances(coords);
      
      if (!ROUTE_SEGMENTS[route]) ROUTE_SEGMENTS[route] = {};
      ROUTE_SEGMENTS[route][getSegmentKey(fromSt, toSt)] = { coords, cumDist };
    });
    
    console.log('✅ Route segments loaded:', Object.keys(ROUTE_SEGMENTS));
  } catch (err) {
    console.error('❌ Failed to load route segments:', err);
    console.warn('Falling back to straight-line interpolation');
  }
}

// ═══════════════════════════════════════════════════════════
// UTILITY FUNCTIONS
// ═══════════════════════════════════════════════════════════

function secondsToTime(s) {
  s = ((s % 86400) + 86400) % 86400;
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = Math.floor(s % 60);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

// Dwell time at station (seconds)
const DWELL_TIME = 45;

// ═══════════════════════════════════════════════════════════
// SCHEDULE DATA (loaded from external JSON)
// ═══════════════════════════════════════════════════════════

let ALL_TRAINS = [];

async function loadScheduleData() {
  try {
    const response = await fetch('./schedule_data.json');
    if (!response.ok) throw new Error('Failed to load schedule data');
    ALL_TRAINS = await response.json();
    console.log(`✅ Loaded ${ALL_TRAINS.length} trips from schedule_data.json`);
  } catch (err) {
    console.error('❌ Failed to load schedule:', err);
    // Fallback to empty array (no trains will show)
    ALL_TRAINS = [];
  }
}

// ═══════════════════════════════════════════════════════════
// TIME SIMULATION
// ═══════════════════════════════════════════════════════════
let simTime = null; // in seconds from midnight
let simSpeed = 1;
let lastRealTime = null;

function getRealSecondsSinceMidnight() {
  const now = new Date();
  return now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
}

function initSimTime() {
  simTime = getRealSecondsSinceMidnight();
  lastRealTime = Date.now();
}

function updateSimTime() {
  const now = Date.now();
  const elapsed = (now - lastRealTime) / 1000;
  simTime = (simTime + elapsed * simSpeed) % 86400;
  lastRealTime = now;
}

function changeSpeed(delta) {
  const speeds = [0.5, 1, 2, 5, 10, 30, 60, 120];
  const idx = speeds.indexOf(simSpeed);
  const newIdx = Math.max(0, Math.min(speeds.length-1, idx + delta));
  simSpeed = speeds[newIdx];
  document.getElementById('speed-display').textContent = simSpeed + '×';
}

// ═══════════════════════════════════════════════════════════
// TRAIN POSITION ENGINE
// ═══════════════════════════════════════════════════════════

function getTrainState(train, t) {
  const timings = train.timings;
  
  // Before departure
  if (t < timings[0].arriveAt) return null;
  // After arrival at last station + dwell
  const last = timings[timings.length - 1];
  if (t > last.departAt) return null;

  for (let i = 0; i < timings.length; i++) {
    const curr = timings[i];
    // At station (dwell)
    if (t >= curr.arriveAt && t <= curr.departAt) {
      return {
        phase: 'dwell',
        stationId: curr.stationId,
        lat: STATIONS[curr.stationId].lat,
        lon: STATIONS[curr.stationId].lon,
        stationIndex: i,
        totalStations: timings.length,
        nextStation: i < timings.length - 1 ? timings[i+1].stationId : null,
        progress: i / (timings.length - 1),
      };
    }
    // Between stations
    if (i < timings.length - 1) {
      const next = timings[i+1];
      if (t > curr.departAt && t < next.arriveAt) {
        const travelDuration = next.arriveAt - curr.departAt;
        const elapsed = t - curr.departAt;
        const frac = Math.min(1, elapsed / travelDuration);
        // Smooth easing
        const ease = frac < 0.5 ? 2*frac*frac : -1+(4-2*frac)*frac;
        
        // Try to interpolate along actual track geometry
        const segment = getRouteSegment(train.route, curr.stationId, next.stationId);
        let lat, lon;
        
        if (segment) {
          const pos = interpolateAlongTrack(segment, ease);
          lat = pos.lat;
          lon = pos.lon;
        } else {
          // Fallback: straight line interpolation
          const fromSt = STATIONS[curr.stationId];
          const toSt = STATIONS[next.stationId];
          lat = fromSt.lat + (toSt.lat - fromSt.lat) * ease;
          lon = fromSt.lon + (toSt.lon - fromSt.lon) * ease;
        }
        
        return {
          phase: 'moving',
          fromStation: curr.stationId,
          toStation: next.stationId,
          lat,
          lon,
          frac: ease,
          stationIndex: i,
          totalStations: timings.length,
          nextStation: next.stationId,
          eta: Math.ceil((next.arriveAt - t) / 60),
          progress: (i + ease) / (timings.length - 1),
        };
      }
    }
  }
  return null;
}

// ═══════════════════════════════════════════════════════════
// MAP SETUP
// ═══════════════════════════════════════════════════════════
const map = L.map('map', {
  center: [-6.2600, 106.9200],
  zoom: 12,
  zoomControl: false,
  attributionControl: false,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '©OpenStreetMap ©CARTO',
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

L.control.zoom({ position: 'bottomright' }).addTo(map);
L.control.attribution({ position: 'bottomleft', prefix: 'Data: OpenStreetMap • GAPEKA KAI' }).addTo(map);

// Draw track from GeoJSON
// Memuat jalur dari file export.geojson menggunakan fetch API
fetch('./export.geojson')
  .then(response => {
    if (!response.ok) throw new Error("Gagal memuat file geojson");
    return response.json();
  })
  .then(geojsonData => {
    L.geoJSON(geojsonData, {
      style: (feature) => {
        const service = feature.properties && feature.properties.service;
        return {
          color: service === 'siding' ? '#1e2d45' : '#2a4a7a', // Warna rel abu gelap untuk siding, biru gelap untuk jalur utama
          weight: service === 'siding' ? 1 : 3,
          opacity: service === 'siding' ? 0.5 : 0.8,
        };
      }
    }).addTo(map);
  })
  .catch(error => {
    console.error('Error memuat GeoJSON:', error);
    alert('Gagal memuat lintasan peta. Pastikan Anda menjalankan file ini menggunakan Local Web Server.');
  });

// Draw stylized route lines (on top of OSM track)
const LINE_COLORS = { main: '#a855f7', cibubur: '#00c8ff', bekasi: '#ff9900' };
const routePolylines = { main: null, cibubur: null, bekasi: null };

// Draw colored route lines from GeoJSON route segments (called after loading)
function drawRouteLines() {
  const mainStations = ['dukuh_atas','setiabudi','rasuna_said','kuningan','pancoran','cikoko','ciliwung','cawang'];
  const cibuburStations = ['cawang','taman_mini','kampung_rambutan','ciracas','harjamukti'];
  const bekasiStations = ['cawang','halim','jatibening','cikunir1','cikunir2','bekasi_barat','jatimulya'];
  
  function collectCoords(stationList, routeName) {
    const allCoords = [];
    for (let i = 0; i < stationList.length - 1; i++) {
      const seg = getRouteSegment(routeName, stationList[i], stationList[i+1]);
      if (seg) {
        // Convert [lon,lat] to [lat,lon] for Leaflet
        const leafletCoords = seg.coords.map(c => [c[1], c[0]]);
        if (allCoords.length > 0) leafletCoords.shift(); // skip duplicate junction point
        allCoords.push(...leafletCoords);
      }
    }
    return allCoords;
  }
  
  // Main line (use Track A direction for display)
  const mainCoords = collectCoords(mainStations, 'dukuh_to_cibubur');
  if (mainCoords.length > 0) {
    routePolylines.main = L.polyline(mainCoords, { color: '#a855f7', weight: 4, opacity: 0.7 }).addTo(map);
  }
  
  // Cibubur branch
  const cibuburCoords = collectCoords(cibuburStations, 'dukuh_to_cibubur');
  if (cibuburCoords.length > 0) {
    routePolylines.cibubur = L.polyline(cibuburCoords, { color: '#00c8ff', weight: 4, opacity: 0.7 }).addTo(map);
  }
  
  // Bekasi branch
  const bekasiCoords = collectCoords(bekasiStations, 'dukuh_to_bekasi');
  if (bekasiCoords.length > 0) {
    routePolylines.bekasi = L.polyline(bekasiCoords, { color: '#ff9900', weight: 4, opacity: 0.7 }).addTo(map);
  }
  
  // Fallback if no route data loaded
  if (!mainCoords.length) {
    const makeLineCoords = (stIds) => stIds.map(id => [STATIONS[id].lat, STATIONS[id].lon]);
    L.polyline(makeLineCoords(ROUTES.cibubur_to_dukuh.slice(4)), { color: '#a855f7', weight: 4, opacity: 0.7 }).addTo(map);
    L.polyline(makeLineCoords(ROUTES.cibubur_to_dukuh.slice(0, 5)), { color: '#00c8ff', weight: 4, opacity: 0.7 }).addTo(map);
    L.polyline(makeLineCoords(ROUTES.bekasi_to_dukuh.slice(0, 7)), { color: '#ff9900', weight: 4, opacity: 0.7 }).addTo(map);
  }
}

// Station markers
const stationMarkers = {};
Object.entries(STATIONS).forEach(([id, st]) => {
  const lineColors = st.lines.map(l => LINE_COLORS[l] || '#fff');
  const color = lineColors[0];
  
  const icon = L.divIcon({
    className: '',
    html: `<div class="station-marker" style="border-color:${color};width:${id==='cawang'?14:9}px;height:${id==='cawang'?14:9}px;box-shadow:0 0 6px ${color}40"></div>`,
    iconSize: [14, 14],
    iconAnchor: [7, 7],
  });

  const marker = L.marker([st.lat, st.lon], { icon }).addTo(map);
  marker.bindPopup(`
    <div class="popup-title">🚉 ${st.name}</div>
    <div class="popup-sub">Jalur: ${st.lines.join(', ')}</div>
    <div class="popup-sub" id="popup-next-${id}">Menghitung...</div>
  `, { maxWidth: 200 });
  
  marker.on('click', () => switchTab('schedule', document.querySelectorAll('.tab-btn')[2], id));
  stationMarkers[id] = marker;
});

// ═══════════════════════════════════════════════════════════
// TRAIN MARKERS (dynamic)
// ═══════════════════════════════════════════════════════════
const trainMarkers = {};
let selectedTrain = null;

function getTrainMarkerKey(train) {
  // Use id + route to create unique key since some trips share the same id
  return train.id + '-' + train.route;
}

function getOrCreateMarker(train) {
  const markerKey = getTrainMarkerKey(train);
  if (trainMarkers[markerKey]) return trainMarkers[markerKey];

  const icon = L.divIcon({
    className: '',
    html: `<div class="train-marker" id="tm-${markerKey}" style="background:${train.color};color:#000;border-color:${train.color}80;box-shadow:0 0 10px ${train.color}"></div>`,
    iconSize: [16, 16],
    iconAnchor: [8, 8],
  });

  const marker = L.marker([0, 0], { icon, zIndexOffset: 1000 }).addTo(map);
  marker.bindPopup('', { maxWidth: 220 });
  marker.on('click', () => selectTrain(markerKey));
  trainMarkers[markerKey] = marker;
  return marker;
}

function removeMarker(trainId) {
  if (trainMarkers[trainId]) {
    map.removeLayer(trainMarkers[trainId]);
    delete trainMarkers[trainId];
  }
}

function selectTrain(trainId) {
  selectedTrain = trainId;
  renderTrainList();
}

// ═══════════════════════════════════════════════════════════
// SIDEBAR RENDERING
// ═══════════════════════════════════════════════════════════

function switchTab(name, btn, scheduleStationId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  
  if (name === 'schedule' && scheduleStationId) {
    renderScheduleFor(scheduleStationId);
  }
}

function renderTrainList() {
  const container = document.getElementById('tab-trains');
  const t = simTime;
  
  const activeTrains = ALL_TRAINS
    .map(train => ({ train, state: getTrainState(train, t) }))
    .filter(x => x.state !== null);

  document.getElementById('stat-running').textContent = activeTrains.length;

  let html = '';
  if (activeTrains.length === 0) {
    html = '<div style="padding:20px;color:var(--text-dim);font-size:12px;text-align:center">Tidak ada kereta aktif saat ini</div>';
  }

  activeTrains.forEach(({ train, state }) => {
    const markerKey = getTrainMarkerKey(train);
    const isSelected = selectedTrain === markerKey;
    const lineClass = `badge-${train.line}`;
    const lineLabel = train.line === 'cibubur' ? 'CIBUBUR' : train.line === 'bekasi' ? 'BEKASI' : 'MAIN';
    const pct = Math.round(state.progress * 100);
    const nextName = state.nextStation ? STATIONS[state.nextStation]?.name : '-';

    html += `
      <div class="train-item ${isSelected ? 'selected' : ''}" onclick="selectTrain('${markerKey}')">
        <div class="train-header">
          <span class="train-badge ${lineClass}">${lineLabel}</span>
          <span class="train-name">${train.id}</span>
        </div>
        <div class="train-dest">${train.origin} ${train.direction} ${train.dest}</div>
        <div class="train-progress-bar">
          <div class="train-progress-fill" style="width:${pct}%;background:${train.color}"></div>
        </div>
        <div class="train-eta">
          <span>${state.phase === 'dwell' ? '🟢 Di stasiun '+STATIONS[state.stationId]?.name : '🚆 Menuju '+nextName}</span>
          ${state.eta ? `<span>${state.eta} mnt</span>` : '<span>Di stasiun</span>'}
        </div>
      </div>`;
  });
  container.innerHTML = html;
}

function renderStationList() {
  const container = document.getElementById('tab-stations');
  const t = simTime;
  let html = '';

  Object.entries(STATIONS).forEach(([id, st]) => {
    // Find next train arriving here
    let nextArrival = null;
    let minWait = Infinity;

    ALL_TRAINS.forEach(train => {
      const state = getTrainState(train, t);
      if (!state) return;
      // Find this station in remaining timings
      const timings = train.timings;
      for (let i = 0; i < timings.length; i++) {
        if (timings[i].stationId === id && timings[i].arriveAt >= t - 60) {
          const wait = timings[i].arriveAt - t;
          if (wait >= 0 && wait < minWait) {
            minWait = wait;
            nextArrival = { train, wait };
          }
          break;
        }
      }
    });

    const color = LINE_COLORS[st.lines[0]] || '#fff';
    const waitStr = nextArrival ? (nextArrival.wait < 60 ? 'Tiba' : `${Math.ceil(nextArrival.wait/60)} mnt`) : '-';

    html += `
      <div class="station-item" onclick="focusStation('${id}')">
        <div class="station-dot" style="border-color:${color};${id==='cawang'?'background:'+color:''}"></div>
        <div class="station-info">
          <div class="station-name">${st.name}</div>
          <div class="station-next">Berikutnya: ${nextArrival ? nextArrival.train.direction : 'Tidak ada'}</div>
        </div>
        <div class="station-trains">${waitStr}</div>
      </div>`;
  });
  container.innerHTML = html;
}

function renderScheduleFor(stationId) {
  const st = STATIONS[stationId];
  if (!st) return;

  const t = simTime;
  const upcoming = [];
  
  ALL_TRAINS.forEach(train => {
    train.timings.forEach(timing => {
      if (timing.stationId === stationId) {
        upcoming.push({
          train,
          arriveAt: timing.arriveAt,
          departAt: timing.departAt,
        });
      }
    });
  });

  upcoming.sort((a, b) => a.arriveAt - b.arriveAt);

  const relevant = upcoming.filter(u => u.departAt >= t - 300).slice(0, 20);

  let html = `<div class="schedule-section">
    <div class="schedule-label">Jadwal — ${st.name}</div>`;

  relevant.forEach(({ train, arriveAt, departAt }) => {
    const diff = arriveAt - t;
    let statusClass, statusText;
    if (diff < -DWELL_TIME) {
      statusClass = 'status-done'; statusText = 'Lewat';
    } else if (diff <= 0) {
      statusClass = 'status-running'; statusText = 'Di sini';
    } else if (diff < 180) {
      statusClass = 'status-running'; statusText = `${Math.ceil(diff/60)}m`;
    } else {
      statusClass = 'status-waiting'; statusText = `${Math.ceil(diff/60)}m`;
    }

    const lineLabel = train.line === 'cibubur' ? '🔵' : train.line === 'bekasi' ? '🟠' : '🟣';

    html += `
      <div class="sched-row">
        <span class="sched-time">${secondsToTime(arriveAt).slice(0,5)}</span>
        <span class="sched-dest">${lineLabel} ${train.direction}</span>
        <span class="sched-status ${statusClass}">${statusText}</span>
      </div>`;
  });

  html += '</div>';
  document.getElementById('schedule-content').innerHTML = html;
}

function focusStation(id) {
  const st = STATIONS[id];
  map.setView([st.lat, st.lon], 15, { animate: true });
  stationMarkers[id]?.openPopup();
}

// ═══════════════════════════════════════════════════════════
// MAIN UPDATE LOOP
// ═══════════════════════════════════════════════════════════
let frameCount = 0;
function update() {
  updateSimTime();
  const t = simTime;

  // Clock
  const timeStr = secondsToTime(t);
  document.getElementById('clock-time').textContent = timeStr.slice(0,8);
  const d = new Date();
  document.getElementById('clock-date').textContent = d.toLocaleDateString('id-ID', {weekday:'long',year:'numeric',month:'long',day:'numeric'});
  document.getElementById('clock-speedlabel').textContent = simSpeed > 1 ? `Simulasi ${simSpeed}× lebih cepat` : '';
  document.getElementById('update-time').textContent = `Update: ${timeStr.slice(0,8)}`;

  // Update trains
  const activeIds = new Set();

  ALL_TRAINS.forEach(train => {
    const markerKey = getTrainMarkerKey(train);
    const state = getTrainState(train, t);
    if (!state) {
      if (trainMarkers[markerKey]) removeMarker(markerKey);
      return;
    }

    activeIds.add(markerKey);
    const marker = getOrCreateMarker(train);
    marker.setLatLng([state.lat, state.lon]);

    // Update popup if open
    if (marker.isPopupOpen()) {
      const nextName = state.nextStation ? STATIONS[state.nextStation]?.name : '-';
      marker.getPopup().setContent(`
        <div class="popup-title">🚈 Kereta ${train.id}</div>
        <div class="popup-sub">${train.origin} ${train.direction} ${train.dest}</div>
        <div style="margin-top:6px">
          <div class="popup-sub">Status: <span class="popup-val">${state.phase === 'dwell' ? 'Di '+STATIONS[state.stationId]?.name : 'Bergerak'}</span></div>
          <div class="popup-sub">Berikutnya: <span class="popup-val">${nextName}</span></div>
          ${state.eta ? `<div class="popup-sub">ETA: <span class="popup-val">${state.eta} mnt</span></div>` : ''}
        </div>
      `);
    }
  });

  // Remove markers for finished trains
  Object.keys(trainMarkers).forEach(id => {
    if (!activeIds.has(id)) removeMarker(id);
  });

  // Update sidebar every 5 frames
  if (frameCount % 5 === 0) {
    renderTrainList();
    renderStationList();
    // If schedule tab is active and a station selected, refresh
  }

  frameCount++;
  requestAnimationFrame(update);
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
async function init() {
  // Load external schedule data first, then route segments
  await loadScheduleData();
  await loadRouteSegments();
  drawRouteLines();
  initSimTime();
  update();
}

init();

// Add keyboard shortcut to reset to real time
document.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') {
    simTime = getRealSecondsSinceMidnight();
    simSpeed = 1;
    document.getElementById('speed-display').textContent = '1×';
  }
});
</script>
</body>
